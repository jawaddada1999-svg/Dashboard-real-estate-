<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
        }

        html[dir="ltr"] body {
            direction: ltr;
        }

        html[dir="rtl"] body {
            direction: rtl;
        }

        .container-main {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background-color: #0f172a;
            border-right: 1px solid #334155;
            padding: 20px;
            z-index: 1000;
            overflow-y: auto;
        }

        html[dir="ltr"] .sidebar {
            left: auto;
            right: 0;
            border-right: none;
            border-left: 1px solid #334155;
        }

        .sidebar h2 {
            color: #3b82f6;
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar nav button {
            background-color: transparent;
            color: #cbd5e1;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-align: left;
        }

        .sidebar nav button:hover {
            background-color: #1e293b;
            color: #3b82f6;
        }

        .sidebar nav button.active {
            background-color: #1e293b;
            color: #3b82f6;
        }

        .main-content {
            margin-left: 250px;
            padding: 0;
        }

        html[dir="ltr"] .main-content {
            margin-left: 0;
            margin-right: 250px;
        }

        .header {
            background-color: #0f172a;
            border-bottom: 1px solid #334155;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        .language-selector {
            background-color: #1e293b;
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .language-selector:hover {
            border-color: #3b82f6;
        }

        .content {
            padding: 30px;
            overflow-y: auto;
        }

        .time-filter-section {
            background-color: rgba(30, 41, 59, 0.4);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .time-filter-label {
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        .time-filter-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .time-btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #475569;
            color: #cbd5e1;
        }

        .time-btn:hover {
            background-color: #64748b;
        }

        .time-btn.active {
            background-color: #3b82f6;
            color: white;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            padding: 24px;
            border-radius: 16px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.3);
        }

        .metric-card.blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .metric-card.orange {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .metric-card.green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .metric-label {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .metric-value {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
        }

        .metric-icon {
            font-size: 36px;
        }

        .filters-section {
            background-color: rgba(30, 41, 59, 0.4);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-label {
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .filter-select {
            background-color: #475569;
            color: white;
            border: 1px solid #64748b;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:hover {
            border-color: #3b82f6;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background-color: rgba(30, 41, 59, 0.4);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .chart-card:hover {
            border-color: #3b82f6;
        }

        .chart-card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: white;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }

        .chart-legend {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .legend-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(71, 85, 105, 0.3);
            padding: 12px;
            border-radius: 8px;
        }

        .legend-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
            font-size: 13px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-values {
            display: flex;
            gap: 12px;
            text-align: right;
        }

        .legend-count {
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .legend-percent {
            color: #cbd5e1;
            font-size: 12px;
        }

        .table-section {
            background-color: rgba(30, 41, 59, 0.4);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            overflow-x: auto;
        }

        .table-section h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            border-bottom: 1px solid #334155;
        }

        table th {
            text-align: left;
            padding: 12px;
            color: #3b82f6;
            font-size: 13px;
            font-weight: 600;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            color: #cbd5e1;
            font-size: 13px;
        }

        table tbody tr:hover {
            background-color: rgba(71, 85, 105, 0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            background-color: #1e293b;
            color: #93c5fd;
            font-size: 12px;
            font-weight: 600;
        }

        .classification-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            background-color: #1e293b;
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 600;
        }

        .monthly-report {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-radius: 16px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
        }

        .monthly-report h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .monthly-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .monthly-card {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .monthly-card-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .monthly-card-value {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
        }

        .growth-badge {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border-radius: 8px;
            padding: 12px 16px;
            text-align: center;
            margin-top: 12px;
            font-weight: 700;
        }

        .property-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .property-item {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .property-item label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .property-item .value {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 18px;
            color: #cbd5e1;
        }

        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-left: 200px;
            }

            html[dir="ltr"] .main-content {
                margin-right: 200px;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -250px;
                width: 250px;
                height: 100vh;
                z-index: 2000;
                transition: left 0.3s ease;
            }

            html[dir="ltr"] .sidebar {
                left: auto;
                right: -250px;
            }

            .sidebar.open {
                left: 0;
            }

            html[dir="ltr"] .sidebar.open {
                right: 0;
            }

            .main-content {
                margin-left: 0;
            }

            html[dir="ltr"] .main-content {
                margin-right: 0;
            }

            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .metrics-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }

            .metric-value {
                font-size: 24px;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .monthly-metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="sidebar">
            <h2>RE Dashboard</h2>
            <nav>
                <button class="active">📊 <span class="menu-text"></span></button>

            <div class="content" id="content">

    </div>

        let currentLanguage = 'ar';
        let allData = [];
        let chartInstances = {};

        function t(key) {
            return translations[currentLanguage][key] || key;
        }

        function updateLanguage(lang) {
            currentLanguage = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelector('.header-title').textContent = t('dashboard');
            document.querySelector('.menu-text').textContent = t('dashboard');
            document.querySelector('.menu-text-2').textContent = t('analytics');
            document.querySelector('.loading-text').textContent = t('loading');
            render();
        }

        async function fetchData() {
            try {
                const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQz9JgepSHyiEXcin3VkIgx5jGnQfdTTJKxCTuAsJMslONSZcSJj1GLEkaynd4lIksZpc2ht933QUcM/pub?output=csv');
                const csv = await response.text();
                const rows = csv.split('\n').map(row => {
                    const result = [];
                    let current = '';
                    let insideQuotes = false;
                    for (let i = 0; i < row.length; i++) {
                        const char = row[i];
                        if (char === '"') insideQuotes = !insideQuotes;
                        else if (char === ',' && !insideQuotes) {
                            result.push(current.trim().replace(/^"|"$/g, ''));
                            current = '';
                        } else current += char;
                    }
                    result.push(current.trim().replace(/^"|"$/g, ''));
                    return result;
                });

                const headers = rows[0];
                allData = rows.slice(1).map(row => {
                    const obj = {};
                    headers.forEach((h, i) => obj[h.toLowerCase().trim()] = (row[i] || '').trim());
                    return obj;
                }).filter(r => Object.values(r).some(v => v)).map(item => {
                    const classification = (item['classification'] || '').toLowerCase();
                    const status = (item['status'] || '').toLowerCase();
                    const payment = (item['paiement'] || item['payment'] || '').toLowerCase();
                    const propertyType = (item['type'] || item['property'] || '').toLowerCase();

                    let normalizedClassification = 'cold';
                    if (classification.includes('vip') || classification.includes('🔥')) normalizedClassification = 'vip';
                    else if (classification.includes('warm') || classification.includes('🪵')) normalizedClassification = 'warm';

                    let normalizedStatus = 'nouveau';
                    if (status.includes('cours') || status.includes('⏳')) normalizedStatus = 'enCours';
                    else if (status.includes('vendu') || status.includes('✅')) normalizedStatus = 'vendu';
                    else if (status.includes('perdu') || status.includes('❌')) normalizedStatus = 'perdu';

                    let normalizedPayment = 'cash';
                    if (payment.includes('credit') || payment.includes('crédit')) normalizedPayment = 'credit';

                    let normalizedPropertyType = 'apartment';
                    if (propertyType.includes('villa') || propertyType.includes('فيلا')) normalizedPropertyType = 'villa';
                    else if (propertyType.includes('commercial') || propertyType.includes('محل')) normalizedPropertyType = 'commercialShop';

                    const dateString = item['date'] || new Date().toISOString().split('T')[0];

                    return {
                        name: item['name'] || item['nom'] || 'Lead',
                        phone: item['phone'] || item['téléphone'] || '',
                        budget: item['budget'] || '',
                        payment: normalizedPayment,
                        classification: normalizedClassification,
                        status: normalizedStatus,
                        propertyType: normalizedPropertyType,
                        date: dateString,
                    };
                });

                render();
            } catch (err) {
                document.getElementById('content').innerHTML = `<div class="error-message">${t('error')}: ${err.message}</div>`;
            }
        }

        function getFilteredData(timeFilter, classFilter, statusFilter, propFilter) {
            const today = new Date();
            let startDate = new Date();
            let endDate = new Date();

            switch(timeFilter) {
                case 'today':
                    startDate.setHours(0, 0, 0, 0);
                    endDate.setHours(23, 59, 59, 999);
                    break;
                case 'yesterday':
                    startDate.setDate(today.getDate() - 1);
                    endDate.setDate(today.getDate() - 1);
                    startDate.setHours(0, 0, 0, 0);
                    endDate.setHours(23, 59, 59, 999);
                    break;
                case 'lastWeek':
                    startDate.setDate(today.getDate() - 7);
                    endDate.setDate(today.getDate() - 1);
                    break;
                case 'lastMonth':
                    startDate.setMonth(today.getMonth() - 1);
                    startDate.setDate(1);
                    endDate.setDate(0);
                    break;
            }

            return allData.filter(item => {
                const itemDate = new Date(item.date);
                const matchDate = itemDate >= startDate && itemDate <= endDate;
                const matchClass = classFilter === 'all' || item.classification === classFilter;
                const matchStatus = statusFilter === 'all' || item.status === statusFilter;
                const matchProp = propFilter === 'all' || item.propertyType === propFilter;
                return matchDate && matchClass && matchStatus && matchProp;
            });
        }

        function render() {
            const timeFilter = document.getElementById('timeFilter')?.value || 'today';
            const classFilter = document.getElementById('classFilter')?.value || 'all';
            const statusFilter = document.getElementById('statusFilter')?.value || 'all';
            const propFilter = document.getElementById('propFilter')?.value || 'all';

            const filtered = getFilteredData(timeFilter, classFilter, statusFilter, propFilter);

            const totalLeads = filtered.length;
            const activeDeals = filtered.filter(d => d.status === 'enCours').length;
            const budgetMap = { '0_60M': 30, '60_90M': 75, '90_120M': 105, '120M+': 150 };
            const avgBudget = filtered.length > 0 ? Math.round(filtered.reduce((s, d) => s + (budgetMap[d.budget] || 30), 0) / filtered.length) : 0;

            const statusData = [
                { name: t('nouveau'), value: filtered.filter(d => d.status === 'nouveau').length, color: '#3B82F6' },
                { name: t('enCours'), value: filtered.filter(d => d.status === 'enCours').length, color: '#F59E0B' },
                { name: t('vendu'), value: filtered.filter(d => d.status === 'vendu').length, color: '#10B981' },
                { name: t('perdu'), value: filtered.filter(d => d.status === 'perdu').length, color: '#EF4444' },
            ];

            const classData = [
                { name: t('vip'), value: filtered.filter(d => d.classification === 'vip').length, color: '#10B981' },
                { name: t('warm'), value: filtered.filter(d => d.classification === 'warm').length, color: '#F59E0B' },
                { name: t('cold'), value: filtered.filter(d => d.classification === 'cold').length, color: '#EF4444' },
            ];

            const paymentData = [
                { name: t('cash'), value: filtered.filter(d => d.payment === 'cash').length, color: '#3B82F6' },
                { name: t('credit'), value: filtered.filter(d => d.payment === 'credit').length, color: '#8B5CF6' },
            ];

            const propertyData = [
                { name: t('villa'), value: filtered.filter(d => d.propertyType === 'villa').length, color: '#EC4899' },
                { name: t('apartment'), value: filtered.filter(d => d.propertyType === 'apartment').length, color: '#06B6D4' },
                { name: t('commercialShop'), value: filtered.filter(d => d.propertyType === 'commercialShop').length, color: '#8B5CF6' },
            ];

            const html = `
                <div class="time-filter-section">
                    <label class="time-filter-label">${t('timeFilter')}</label>
                    <div class="time-filter-buttons">
                        <button class="time-btn ${timeFilter === 'today' ? 'active' : ''}" onclick="updateFilter('timeFilter', 'today')">${t('today')}</button>
                        <button class="time-btn ${timeFilter === 'yesterday' ? 'active' : ''}" onclick="updateFilter('timeFilter', 'yesterday')">${t('yesterday')}</button>
                        <button class="time-btn ${timeFilter === 'lastWeek' ? 'active' : ''}" onclick="updateFilter('timeFilter', 'lastWeek')">${t('lastWeek')}</button>
                        <button class="time-btn ${timeFilter === 'lastMonth' ? 'active' : ''}" onclick="updateFilter('timeFilter', 'lastMonth')">${t('lastMonth')}</button>
                    </div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card blue">
                        <div>
                            <div class="metric-label">${t('totalLeads')}</div>
                            <div class="metric-value">${totalLeads}</div>
                        </div>
                        <div class="metric-icon">👥</div>
                    </div>
                    <div class="metric-card orange">
                        <div>
                            <div class="metric-label">${t('activeDeals')}</div>
                            <div class="metric-value">${activeDeals}</div>
                        </div>
                        <div class="metric-icon">🔥</div>
                    </div>
                    <div class="metric-card green">
                        <div>
                            <div class="metric-label">${t('avgBudget')}</div>
                            <div class="metric-value">${avgBudget}M</div>
                        </div>
                        <div class="metric-icon">💰</div>
                    </div>
                </div>

                <div class="filters-section">
                    <div class="filters-grid">
                        <div class="filter-group">
                            <label class="filter-label">${t('filterByClassification')}</label>
                            <select class="filter-select" id="classFilter" onchange="updateFilter('classFilter', this.value)">
                                <option value="all">${t('all')}</option>
                                <option value="vip">${t('vip')}</option>
                                <option value="warm">${t('warm')}</option>
                                <option value="cold">${t('cold')}</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">${t('filterByStatus')}</label>
                            <select class="filter-select" id="statusFilter" onchange="updateFilter('statusFilter', this.value)">
                                <option value="all">${t('all')}</option>
                                <option value="nouveau">${t('nouveau')}</option>
                                <option value="enCours">${t('enCours')}</option>
                                <option value="vendu">${t('vendu')}</option>
                                <option value="perdu">${t('perdu')}</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">${t('filterByPropertyType')}</label>
                            <select class="filter-select" id="propFilter" onchange="updateFilter('propFilter', this.value)">
                                <option value="all">${t('all')}</option>
                                <option value="villa">${t('villa')}</option>
                                <option value="apartment">${t('apartment')}</option>
                                <option value="commercialShop">${t('commercialShop')}</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>${t('statusDistribution')}</h3>
                        <div class="chart-container">
                            <canvas id="statusChart"></canvas>
                        </div>
                        <div class="chart-legend">
                            ${statusData.map(d => `
                                <div class="legend-item">
                                    <div class="legend-label">
                                        <div class="legend-color" style="background-color: ${d.color}"></div>
                                        ${d.name}
                                    </div>
                                    <div class="legend-values">
                                        <span class="legend-count">${d.value}</span>
                                        <span class="legend-percent">${d.value > 0 ? ((d.value / filtered.length) * 100).toFixed(1) : 0}%</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3>${t('classificationBreakdown')}</h3>
                        <div class="chart-container">
                            <canvas id="classChart"></canvas>
                        </div>
                        <div class="chart-legend">
                            ${classData.map(d => `
                                <div class="legend-item">
                                    <div class="legend-label">
                                        <div class="legend-color" style="background-color: ${d.color}"></div>
                                        ${d.name}
                                    </div>
                                    <div class="legend-values">
                                        <span class="legend-count">${d.value}</span>
                                        <span class="legend-percent">${d.value > 0 ? ((d.value / filtered.length) * 100).toFixed(1) : 0}%</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3>💰 ${t('paymentMethod')}</h3>
                        <div class="chart-container">
                            <canvas id="paymentChart"></canvas>
                        </div>
                        <div class="chart-legend">
                            ${paymentData.map(d => `
                                <div class="legend-item">
                                    <div class="legend-label">
                                        <div class="legend-color" style="background-color: ${d.color}"></div>
                                        ${d.name}
                                    </div>
                                    <div class="legend-values">
                                        <span class="legend-count">${d.value}</span>
                                        <span class="legend-percent">${d.value > 0 ? ((d.value / filtered.length) * 100).toFixed(1) : 0}%</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3>${t('propertyType')}</h3>
                        <div class="chart-container">
                            <canvas id="propertyChart"></canvas>
                        </div>
                        <div class="chart-legend">
                            ${propertyData.map(d => `
                                <div class="legend-item">
                                    <div class="legend-label">
                                        <div class="legend-color" style="background-color: ${d.color}"></div>
                                        ${d.name}
                                    </div>
                                    <div class="legend-values">
                                        <span class="legend-count">${d.value}</span>
                                        <span class="legend-percent">${d.value > 0 ? ((d.value / filtered.length) * 100).toFixed(1) : 0}%</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="table-section">
                    <h3>${t('leadsTable')}</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>${t('name')}</th>
                                <th>${t('phone')}</th>
                                <th>${t('budget')}</th>
                                <th>${t('propertyType')}</th>
                                <th>${t('status')}</th>
                                <th>${t('classification')}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filtered.slice(0, 12).map(row => `
                                <tr>
                                    <td>${row.name}</td>
                                    <td>${row.phone}</td>
                                    <td>${row.budget}</td>
                                    <td>${t(row.propertyType)}</td>
                                    <td><span class="status-badge">${t(row.status)}</span></td>
                                    <td><span class="classification-badge">${t(row.classification)}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <p style="color: #cbd5e1; margin-top: 15px; font-size: 13px;">${t('count')}: ${filtered.length}</p>
                </div>

                <div class="monthly-report">
                    <h2>${t('monthlyPerformance')}</h2>
                    <div class="monthly-metrics">
                        <div class="monthly-card">
                            <div class="monthly-card-label">${t('thisMonth')}</div>
                            <div class="monthly-card-value">${totalLeads}</div>
                        </div>
                        <div class="monthly-card">
                            <div class="monthly-card-label">${t('lastMonthText')}</div>
                            <div class="monthly-card-value">${allData.length - totalLeads}</div>
                        </div>
                    </div>
                    <div class="property-breakdown">
                        <div class="property-item">
                            <label>${t('apartmentCount')}</label>
                            <div class="value">${filtered.filter(d => d.propertyType === 'apartment').length}</div>
                        </div>
                        <div class="property-item">
                            <label>${t('villaCount')}</label>
                            <div class="value">${filtered.filter(d => d.propertyType === 'villa').length}</div>
                        </div>
                        <div class="property-item">
                            <label>${t('shopCount')}</label>
                            <div class="value">${filtered.filter(d => d.propertyType === 'commercialShop').length}</div>
                        </div>
                    </div>
                    <div class="property-breakdown">
                        <div class="property-item">
                            <label>${t('soldCount')}</label>
                            <div class="value" style="color: #4ade80;">${filtered.filter(d => d.status === 'vendu').length}</div>
                        </div>
                        <div class="property-item">
                            <label>${t('inProgressCount')}</label>
                            <div class="value" style="color: #fbbf24;">${filtered.filter(d => d.status === 'enCours').length}</div>
                        </div>
                        <div class="property-item">
                            <label>${t('lostCount')}</label>
                            <div class="value" style="color: #f87171;">${filtered.filter(d => d.status === 'perdu').length}</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;

            setTimeout(() => {
                if (chartInstances.status) chartInstances.status.destroy();
                if (chartInstances.class) chartInstances.class.destroy();
                if (chartInstances.payment) chartInstances.payment.destroy();
                if (chartInstances.property) chartInstances.property.destroy();

                chartInstances.status = createDoughnutChart('statusChart', statusData);
                chartInstances.class = createDoughnutChart('classChart', classData);
                chartInstances.payment = createDoughnutChart('paymentChart', paymentData);
                chartInstances.property = createDoughnutChart('propertyChart', propertyData);
            }, 100);
        }

        function createDoughnutChart(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [{
                        data: data.map(d => d.value),
                        backgroundColor: data.map(d => d.color),
                        borderColor: '#0f172a',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function updateFilter(type, value) {
            render();
        }

        document.getElementById('languageSelect').addEventListener('change', (e) => {
            updateLanguage(e.target.value);
        });

        updateLanguage('ar');
        fetchData();
    </script>
</body>
</html>
