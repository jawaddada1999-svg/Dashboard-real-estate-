<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON FLOW - Real Estate Automation Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #05070f 0%, #0a0e1f 50%, #05070f 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1426;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        .container-main {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            gap: 0;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            background: linear-gradient(180deg, rgba(5, 7, 15, 0.95) 0%, rgba(15, 20, 38, 0.95) 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 20px;
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: white;
        }

        .sidebar-title {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .menu-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #3b82f6;
            transform: translateX(4px);
        }

        .menu-btn.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(249, 115, 22, 0.2) 100%);
            border-color: rgba(249, 115, 22, 0.5);
            color: #fb923c;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.2);
        }

        .menu-btn.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(180deg, #f97316, #fb923c);
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            margin-left: 280px;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(180deg, rgba(5, 7, 15, 0.8) 0%, rgba(15, 20, 38, 0.6) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-title {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 10px;
            color: #e2e8f0;
            width: 280px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .language-selector {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .language-selector:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        /* ============ CONTENT AREA ============ */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ METRICS SECTION ============ */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(249, 115, 22, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
        }

        .metric-card:hover {
            border-color: rgba(249, 115, 22, 0.3);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(249, 115, 22, 0.1);
        }

        .metric-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .metric-info h3 {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: #f1f5f9;
            line-height: 1;
        }

        .metric-icon {
            font-size: 32px;
        }

        /* ============ FILTER & CHART SECTIONS ============ */
        .filter-chart-block {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(249, 115, 22, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-label {
            font-size: 14px;
            font-weight: 700;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:hover,
        .filter-select:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .filter-select option {
            background: #0f172a;
            color: #e2e8f0;
        }

        .chart-container-wrapper {
            margin-top: 30px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-canvas-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            height: 320px;
        }

        .chart-legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .legend-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .legend-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-text {
            font-size: 13px;
            color: #cbd5e1;
            flex: 1;
        }

        .legend-value {
            font-weight: 700;
            color: #f1f5f9;
            font-size: 14px;
        }

        /* ============ MONTHLY REPORT ============ */
        .monthly-report {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(249, 115, 22, 0.1) 100%);
            border: 1px solid rgba(249, 115, 22, 0.3);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        .report-title {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 30px;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .report-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            text-align: center;
            transition: all 0.3s ease;
        }

        .report-card:hover {
            border-color: rgba(249, 115, 22, 0.3);
            transform: translateY(-4px);
        }

        .report-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .report-value {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: #f1f5f9;
        }

        .report-value.accent {
            background: linear-gradient(135deg, #3b82f6, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ============ LEADS TABLE ============ */
        .table-container {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(249, 115, 22, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(20px);
            overflow-x: auto;
        }

        .table-title {
            font-size: 18px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            border-bottom: 2px solid rgba(255, 255, 255, 0.12);
        }

        table th {
            text-align: left;
            padding: 16px 12px;
            color: #3b82f6;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table td {
            padding: 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            font-size: 14px;
        }

        table tbody tr:hover {
            background: rgba(59, 130, 246, 0.1);
            transition: background 0.3s ease;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .badge.vip {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
            border-color: rgba(220, 38, 38, 0.3);
        }

        .badge.warm {
            background: rgba(249, 115, 22, 0.2);
            color: #fb923c;
            border-color: rgba(249, 115, 22, 0.3);
        }

        .badge.cold {
            background: rgba(6, 182, 212, 0.2);
            color: #67e8f9;
            border-color: rgba(6, 182, 212, 0.3);
        }

        /* ============ LOADING STATE ============ */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #94a3b8;
            font-weight: 600;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 1024px) {
            .container-main {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                padding: 20px;
            }

            .main-content {
                margin-left: 0;
            }

            .sidebar-menu {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .menu-btn {
                flex: 1;
                min-width: 150px;
            }

            .header {
                flex-direction: column;
                gap: 20px;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
            }

            .search-input {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
                gap: 20px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .report-grid {
                grid-template-columns: 1fr;
            }

            .header-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">⚡</div>
                <div class="sidebar-title">AXON FLOW</div>
            </div>
            <div class="sidebar-menu">
                <button class="menu-btn active" onclick="switchSection('dashboard')">
                    📊 <span class="section-name">لوحة التحكم</span>
                </button>
                <button class="menu-btn" onclick="switchSection('analytics')">
                    📈 <span class="section-name-2">التحليلات المتقدمة</span>
                </button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- HEADER -->
            <div class="header">
                <div class="header-title">AXON FLOW Dashboard</div>
                <div class="header-controls">
                    <input type="text" class="search-input" id="searchInput" placeholder="🔍 ابحث عن عميل...">
                    <select class="language-selector" id="languageSelect">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                    </select>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="content">
                <!-- DASHBOARD SECTION -->
                <div id="dashboard" class="section active">
                    <div class="metrics-grid" id="metricsGrid"></div>

                    <!-- Classification Filter & Chart -->
                    <div class="filter-chart-block">
                        <div class="filter-group">
                            <label class="filter-label">🎯 تصفية حسب التصنيف</label>
                            <select class="filter-select" id="classificationFilter" onchange="updateCharts()">
                                <option value="all">الكل</option>
                                <option value="VIP">VIP 🔥</option>
                                <option value="WARM">WARM 🪵</option>
                                <option value="COLD">COLD ❄️</option>
                            </select>
                        </div>
                        <div class="chart-container-wrapper">
                            <div class="chart-title">📊 توزيع التصنيف</div>
                            <div class="chart-canvas-container">
                                <canvas id="classificationChart"></canvas>
                            </div>
                            <div class="chart-legend" id="classificationLegend"></div>
                        </div>
                    </div>

                    <!-- Status Filter & Chart -->
                    <div class="filter-chart-block">
                        <div class="filter-group">
                            <label class="filter-label">⏳ تصفية حسب الحالة</label>
                            <select class="filter-select" id="statusFilter" onchange="updateCharts()">
                                <option value="all">الكل</option>
                                <option value="Nouveau">Nouveau 🆕</option>
                                <option value="EnCours">En cours ⏳</option>
                                <option value="Vendu">Vendu ✅</option>
                                <option value="Perdu">Perdu ❌</option>
                            </select>
                        </div>
                        <div class="chart-container-wrapper">
                            <div class="chart-title">📈 توزيع الحالة</div>
                            <div class="chart-canvas-container">
                                <canvas id="statusChart"></canvas>
                            </div>
                            <div class="chart-legend" id="statusLegend"></div>
                        </div>
                    </div>

                    <!-- Property Type Filter & Chart -->
                    <div class="filter-chart-block">
                        <div class="filter-group">
                            <label class="filter-label">🏠 تصفية حسب نوع العقار</label>
                            <select class="filter-select" id="propertyFilter" onchange="updateCharts()">
                                <option value="all">الكل</option>
                                <option value="Apartment">شقة 🏢</option>
                                <option value="Villa">فيلا 🏰</option>
                                <option value="Commercial">محل تجاري 🏪</option>
                            </select>
                        </div>
                        <div class="chart-container-wrapper">
                            <div class="chart-title">🏗️ توزيع نوع العقار</div>
                            <div class="chart-canvas-container">
                                <canvas id="propertyChart"></canvas>
                            </div>
                            <div class="chart-legend" id="propertyLegend"></div>
                        </div>
                    </div>

                    <!-- Monthly Report -->
                    <div class="monthly-report">
                        <div class="report-title">📊 التقرير الشهري المفصل</div>
                        <div class="report-grid" id="monthlyReport"></div>
                    </div>

                    <!-- Leads Table -->
                    <div class="table-container">
                        <div class="table-title">📋 جدول العملاء</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>الهاتف</th>
                                    <th>الميزانية</th>
                                    <th>نوع العقار</th>
                                    <th>الحالة</th>
                                    <th>التصنيف</th>
                                </tr>
                            </thead>
                            <tbody id="leadsTableBody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- ANALYTICS SECTION -->
                <div id="analytics" class="section">
                    <div style="text-align: center; padding: 60px 20px; color: #94a3b8;">
                        <div style="font-size: 48px; margin-bottom: 20px;">📈</div>
                        <p style="font-size: 18px; font-weight: 600;">قسم التحليلات المتقدمة</p>
                        <p style="margin-top: 10px;">سيتم إضافة التقارير والرسوم البيانية المتقدمة قريباً</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            ar: {
                dashboard: 'لوحة التحكم',
                analytics: 'التحليلات المتقدمة',
                totalLeads: 'إجمالي العملاء',
                activeDeals: 'الصفقات النشطة',
                avgBudget: 'متوسط الميزانية',
                vipClients: 'عملاء VIP',
                classification: 'تصفية حسب التصنيف',
                status: 'تصفية حسب الحالة',
                property: 'تصفية حسب نوع العقار',
                loading: 'جاري التحميل...',
            },
            en: {
                dashboard: 'Dashboard',
                analytics: 'Advanced Analytics',
                totalLeads: 'Total Leads',
                activeDeals: 'Active Deals',
                avgBudget: 'Average Budget',
                vipClients: 'VIP Clients',
                classification: 'Filter by Classification',
                status: 'Filter by Status',
                property: 'Filter by Property Type',
                loading: 'Loading...',
            },
            fr: {
                dashboard: 'Tableau de Bord',
                analytics: 'Analytiques Avancées',
                totalLeads: 'Prospects Total',
                activeDeals: 'Affaires Actives',
                avgBudget: 'Budget Moyen',
                vipClients: 'Clients VIP',
                classification: 'Filtrer par Classification',
                status: 'Filtrer par Statut',
                property: 'Filtrer par Type de Propriété',
                loading: 'Chargement...',
            }
        };

        let currentLanguage = 'ar';
        let allData = [];
        let chartInstances = {};

        function t(key) {
            return translations[currentLanguage][key] || key;
        }

        function switchSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.menu-btn').classList.add('active');
        }

        async function fetchData() {
            try {
                const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQz9JgepSHyiEXcin3VkIgx5jGnQfdTTJKxCTuAsJMslONSZcSJj1GLEkaynd4lIksZpc2ht933QUcM/pub?output=csv');
                const csv = await response.text();
                
                const rows = csv.split('\n');
                const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
                
                allData = rows.slice(1).map(row => {
                    const values = row.split(',').map(v => v.trim());
                    const obj = {};
                    headers.forEach((h, i) => obj[h] = values[i] || '');
                    return obj;
                }).filter(r => Object.values(r).some(v => v));

                updateLanguage(currentLanguage);
            } catch (err) {
                console.error('Error fetching data:', err);
                document.querySelector('.content').innerHTML = '<div class="loading"><span style="color: #ef4444;">❌ خطأ في تحميل البيانات</span></div>';
            }
        }

        function getFilteredData() {
            const classFilter = document.getElementById('classificationFilter')?.value || 'all';
            const statusFilter = document.getElementById('statusFilter')?.value || 'all';
            const propertyFilter = document.getElementById('propertyFilter')?.value || 'all';
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';

            return allData.filter(item => {
                const classMatch = classFilter === 'all' || (item['classification'] || '').includes(classFilter);
                const statusMatch = statusFilter === 'all' || (item['status'] || item['etat du projet'] || '').includes(statusFilter);
                const propertyMatch = propertyFilter === 'all' || (item['type'] || item['property type'] || '').includes(propertyFilter);
                const searchMatch = !searchTerm || (item['name'] || item['nom'] || '').toLowerCase().includes(searchTerm) || (item['phone'] || item['telephone'] || '').includes(searchTerm);

                return classMatch && statusMatch && propertyMatch && searchMatch;
            });
        }

        function updateCharts() {
            const filtered = getFilteredData();

            // Classification Data
            const classificationData = {
                'VIP 🔥': filtered.filter(d => (d['classification'] || '').includes('VIP')).length,
                'WARM 🪵': filtered.filter(d => (d['classification'] || '').includes('WARM')).length,
                'COLD ❄️': filtered.filter(d => (d['classification'] || '').includes('COLD')).length,
            };

            // Status Data
            const statusData = {
                'Nouveau 🆕': filtered.filter(d => (d['status'] || '').includes('Nouveau')).length,
                'En cours ⏳': filtered.filter(d => (d['status'] || '').includes('cours')).length,
                'Vendu ✅': filtered.filter(d => (d['status'] || '').includes('Vendu')).length,
                'Perdu ❌': filtered.filter(d => (d['status'] || '').includes('Perdu')).length,
            };

            // Property Type Data
            const propertyData = {
                'شقة 🏢': filtered.filter(d => (d['type'] || '').includes('Apartment')).length,
                'فيلا 🏰': filtered.filter(d => (d['type'] || '').includes('Villa')).length,
                'محل تجاري 🏪': filtered.filter(d => (d['type'] || '').includes('Commercial')).length,
            };

            renderCharts(classificationData, statusData, propertyData);
            renderLeadsTable(filtered);
            renderMonthlyReport(filtered);
        }

        function renderCharts(classData, statusData, propertyData) {
            const colors = ['#3b82f6', '#f97316', '#8b5cf6', '#ec4899', '#10b981', '#06b6d4'];

            // Classification Chart
            if (chartInstances.classification) chartInstances.classification.destroy();
            const ctx1 = document.getElementById('classificationChart');
            chartInstances.classification = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(classData),
                    datasets: [{
                        data: Object.values(classData),
                        backgroundColor: colors.slice(0, 3),
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            // Status Chart
            if (chartInstances.status) chartInstances.status.destroy();
            const ctx2 = document.getElementById('statusChart');
            chartInstances.status = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: Object.keys(statusData),
                    datasets: [{
                        label: 'العدد',
                        data: Object.values(statusData),
                        backgroundColor: colors,
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            });

            // Property Chart
            if (chartInstances.property) chartInstances.property.destroy();
            const ctx3 = document.getElementById('propertyChart');
            chartInstances.property = new Chart(ctx3, {
                type: 'pie',
                data: {
                    labels: Object.keys(propertyData),
                    datasets: [{
                        data: Object.values(propertyData),
                        backgroundColor: colors.slice(0, 3),
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            renderLegends(classData, statusData, propertyData);
        }

        function renderLegends(classData, statusData, propertyData) {
            const colors = ['#3b82f6', '#f97316', '#8b5cf6', '#ec4899', '#10b981', '#06b6d4'];

            document.getElementById('classificationLegend').innerHTML = Object.entries(classData).map((item, i) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[i % colors.length]};"></div>
                    <span class="legend-text">${item[0]}</span>
                    <span class="legend-value">${item[1]}</span>
                </div>
            `).join('');

            document.getElementById('statusLegend').innerHTML = Object.entries(statusData).map((item, i) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[i % colors.length]};"></div>
                    <span class="legend-text">${item[0]}</span>
                    <span class="legend-value">${item[1]}</span>
                </div>
            `).join('');

            document.getElementById('propertyLegend').innerHTML = Object.entries(propertyData).map((item, i) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[i % colors.length]};"></div>
                    <span class="legend-text">${item[0]}</span>
                    <span class="legend-value">${item[1]}</span>
                </div>
            `).join('');
        }

        function renderLeadsTable(filtered) {
            const tbody = document.getElementById('leadsTableBody');
            tbody.innerHTML = filtered.slice(0, 20).map(item => `
                <tr>
                    <td>${item['name'] || item['nom'] || '-'}</td>
                    <td>${item['phone'] || item['telephone'] || '-'}</td>
                    <td>${item['budget'] || item['budgets'] || '-'}</td>
                    <td>${item['type'] || item['property type'] || '-'}</td>
                    <td><span class="badge">${item['status'] || item['etat du projet'] || '-'}</span></td>
                    <td><span class="badge ${(item['classification'] || '').toLowerCase()}">${item['classification'] || '-'}</span></td>
                </tr>
            `).join('');
        }

        function renderMonthlyReport(filtered) {
            const totalLeads = filtered.length;
            const apartments = filtered.filter(d => (d['type'] || '').includes('Apartment')).length;
            const villas = filtered.filter(d => (d['type'] || '').includes('Villa')).length;
            const commercial = filtered.filter(d => (d['type'] || '').includes('Commercial')).length;
            
            const vipCount = filtered.filter(d => (d['classification'] || '').includes('VIP')).length;
            const warmCount = filtered.filter(d => (d['classification'] || '').includes('WARM')).length;
            const coldCount = filtered.filter(d => (d['classification'] || '').includes('COLD')).length;

            const avgBudgetApt = apartments > 0 ? (filtered.filter(d => (d['type'] || '').includes('Apartment')).reduce((sum, d) => sum + (parseInt(d['budget']) || 0), 0) / apartments).toFixed(0) : 0;
            const avgBudgetVilla = villas > 0 ? (filtered.filter(d => (d['type'] || '').includes('Villa')).reduce((sum, d) => sum + (parseInt(d['budget']) || 0), 0) / villas).toFixed(0) : 0;
            const avgBudgetCom = commercial > 0 ? (filtered.filter(d => (d['type'] || '').includes('Commercial')).reduce((sum, d) => sum + (parseInt(d['budget']) || 0), 0) / commercial).toFixed(0) : 0;

            document.getElementById('monthlyReport').innerHTML = `
                <div class="report-card">
                    <div class="report-label">🎯 إجمالي الليدات</div>
                    <div class="report-value accent">${totalLeads}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">🏢 طلبات الشقق</div>
                    <div class="report-value">${apartments}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">🏰 طلبات الفيلات</div>
                    <div class="report-value">${villas}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">🏪 طلبات المحلات</div>
                    <div class="report-value">${commercial}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">💰 متوسط ميزانية الشقق</div>
                    <div class="report-value">${avgBudgetApt}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">💰 متوسط ميزانية الفيلات</div>
                    <div class="report-value">${avgBudgetVilla}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">💰 متوسط ميزانية المحلات</div>
                    <div class="report-value">${avgBudgetCom}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">🔥 عملاء VIP</div>
                    <div class="report-value" style="color: #f87171;">${vipCount}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">🪵 عملاء WARM</div>
                    <div class="report-value" style="color: #fb923c;">${warmCount}</div>
                </div>
                <div class="report-card">
                    <div class="report-label">❄️ عملاء COLD</div>
                    <div class="report-value" style="color: #67e8f9;">${coldCount}</div>
                </div>
            `;
        }

        function updateMetrics() {
            const filtered = getFilteredData();
            const totalLeads = filtered.length;
            const activeDeal = filtered.filter(d => (d['status'] || '').includes('cours')).length;
            const avgBudget = filtered.length > 0 ? (filtered.reduce((sum, d) => sum + (parseInt(d['budget']) || 0), 0) / filtered.length).toFixed(0) : 0;
            const vipCount = filtered.filter(d => (d['classification'] || '').includes('VIP')).length;

            document.getElementById('metricsGrid').innerHTML = `
                <div class="metric-card">
                    <div class="metric-content">
                        <div class="metric-info">
                            <h3>📊 إجمالي الليدات</h3>
                            <div class="metric-value">${totalLeads}</div>
                        </div>
                        <div class="metric-icon">👥</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-content">
                        <div class="metric-info">
                            <h3>⏳ الصفقات النشطة</h3>
                            <div class="metric-value">${activeDeal}</div>
                        </div>
                        <div class="metric-icon">🔥</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-content">
                        <div class="metric-info">
                            <h3>💰 متوسط الميزانية</h3>
                            <div class="metric-value">${avgBudget}</div>
                        </div>
                        <div class="metric-icon">💎</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-content">
                        <div class="metric-info">
                            <h3>🔥 عملاء VIP</h3>
                            <div class="metric-value">${vipCount}</div>
                        </div>
                        <div class="metric-icon">⭐</div>
                    </div>
                </div>
            `;
        }

        function updateLanguage(lang) {
            currentLanguage = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelector('.section-name').textContent = currentLanguage === 'ar' ? 'لوحة التحكم' : 'Dashboard';
            document.querySelector('.section-name-2').textContent = currentLanguage === 'ar' ? 'التحليلات المتقدمة' : 'Advanced Analytics';
            document.querySelector('.search-input').placeholder = currentLanguage === 'ar' ? '🔍 ابحث عن عميل...' : '🔍 Search...';

            updateMetrics();
            updateCharts();
        }

        document.getElementById('languageSelect').addEventListener('change', (e) => {
            updateLanguage(e.target.value);
        });

        document.getElementById('searchInput').addEventListener('input', () => {
            updateCharts();
        });

        fetchData();
    </script>
</body>
</html>
