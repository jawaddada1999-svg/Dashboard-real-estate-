<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Real Estate Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #05070f 0%, #0a0e1f 50%, #05070f 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f1426;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        .container-main {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            gap: 0;
        }

        /* SIDEBAR */
        .sidebar {
            background: linear-gradient(180deg, rgba(5, 7, 15, 0.95) 0%, rgba(15, 20, 38, 0.95) 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 20px;
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #3b82f6, #f97316);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: white;
        }

        .sidebar-title {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: #f1f5f9;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .menu-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }

        .menu-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
            color: #3b82f6;
        }

        .menu-btn.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(180deg, #3b82f6, #f97316);
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 280px;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(180deg, rgba(5, 7, 15, 0.8) 0%, rgba(15, 20, 38, 0.6) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-title {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #f1f5f9;
        }

        .header-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 10px;
            color: #e2e8f0;
            width: 280px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .language-selector {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .language-selector:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* TIME FILTER */
        .time-filter-section {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(249, 115, 22, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(20px);
        }

        .filter-label {
            font-size: 13px;
            font-weight: 700;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            display: block;
        }

        .time-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .time-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .time-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .time-btn.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(249, 115, 22, 0.2));
            border-color: rgba(59, 130, 246, 0.5);
            color: #f1f5f9;
        }

        /* METRICS CARDS */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .metric-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(15, 20, 38, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .metric-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-4px);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12) 0%, rgba(15, 20, 38, 0.9) 100%);
        }

        .metric-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .metric-info h3 {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: #f1f5f9;
            line-height: 1;
        }

        .metric-icon {
            font-size: 28px;
        }

        /* FILTERS & CHARTS */
        .filters-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .filter-chart-block {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(249, 115, 22, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(20px);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filter-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:hover,
        .filter-select:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .filter-select option {
            background: #0f172a;
            color: #e2e8f0;
        }

        .chart-title {
            font-size: 15px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .chart-canvas-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            height: 280px;
        }

        .chart-legend {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .legend-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .legend-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-text {
            font-size: 13px;
            color: #cbd5e1;
            flex: 1;
        }

        .legend-value {
            font-weight: 700;
            color: #f1f5f9;
            font-size: 13px;
            min-width: 40px;
            text-align: right;
        }

        /* TABLE CONTAINER */
        .table-container {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(249, 115, 22, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(20px);
            overflow-x: auto;
        }

        .table-title {
            font-size: 16px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        table th {
            text-align: left;
            padding: 14px 12px;
            color: #60a5fa;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            font-size: 13px;
        }

        table tbody tr:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .badge.vip {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
            border-color: rgba(220, 38, 38, 0.3);
        }

        .badge.warm {
            background: rgba(249, 115, 22, 0.2);
            color: #fb923c;
            border-color: rgba(249, 115, 22, 0.3);
        }

        .badge.cold {
            background: rgba(6, 182, 212, 0.2);
            color: #67e8f9;
            border-color: rgba(6, 182, 212, 0.3);
        }

        /* MONTHLY COMPARISON TABLE */
        .monthly-comparison {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(249, 115, 22, 0.08) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(20px);
            margin-top: 20px;
        }

        .comparison-title {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .comparison-table-wrapper {
            overflow-x: auto;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .comparison-table thead {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, rgba(249, 115, 22, 0.1) 100%);
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
        }

        .comparison-table th {
            padding: 16px 16px;
            text-align: left;
            color: #60a5fa;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .comparison-table th:last-child {
            border-right: none;
        }

        .comparison-table td {
            padding: 16px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            font-size: 14px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .comparison-table td:last-child {
            border-right: none;
        }

        .comparison-table tbody tr {
            transition: all 0.3s ease;
        }

        .comparison-table tbody tr:hover {
            background: rgba(59, 130, 246, 0.15);
        }

        .comparison-table td.metric-name {
            font-weight: 600;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.02);
        }

        .comparison-table td.value-previous,
        .comparison-table td.value-current {
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: #60a5fa;
        }

        .comparison-table td.value-growth {
            text-align: center;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .growth-positive {
            color: #10b981;
            font-size: 16px;
        }

        .growth-negative {
            color: #ef4444;
            font-size: 16px;
        }

        .growth-neutral {
            color: #94a3b8;
            font-size: 16px;
        }

        .growth-percent {
            font-weight: 700;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .container-main {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                padding: 20px;
            }

            .main-content {
                margin-left: 0;
            }

            .sidebar-menu {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .menu-btn {
                flex: 1;
                min-width: 150px;
            }

            .filters-section {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
                gap: 20px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
                flex-direction: column;
            }

            .search-input {
                width: 100%;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .time-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .monthly-comparison {
                padding: 20px;
            }

            .comparison-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">📊</div>
                <div class="sidebar-title">Dashboard</div>
            </div>
            <div class="sidebar-menu">
                <button class="menu-btn active" onclick="switchSection('dashboard')">
                    📊 لوحة التحكم
                </button>
                <button class="menu-btn" onclick="switchSection('analytics')">
                    📈 التحليلات
                </button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- HEADER -->
            <div class="header">
                <div class="header-title">لوحة التحكم</div>
                <div class="header-controls">
                    <input type="text" class="search-input" id="searchInput" placeholder="🔍 ابحث عن عميل...">
                    <select class="language-selector" id="languageSelect">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                    </select>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="content">
                <!-- DASHBOARD SECTION -->
                <div id="dashboard" class="section">
                    <!-- TIME FILTER -->
                    <div class="time-filter-section">
                        <label class="filter-label">⏱️ اختر الفترة الزمنية</label>
                        <div class="time-buttons">
                            <button class="time-btn active" onclick="setTimeFilter('today')">اليوم</button>
                            <button class="time-btn" onclick="setTimeFilter('yesterday')">أمس</button>
                            <button class="time-btn" onclick="setTimeFilter('lastWeek')">الأسبوع الماضي</button>
                            <button class="time-btn" onclick="setTimeFilter('lastMonth')">الشهر الماضي</button>
                            <button class="time-btn" onclick="setTimeFilter('all')">الكل</button>
                        </div>
                    </div>

                    <!-- METRICS -->
                    <div class="metrics-grid" id="metricsGrid"></div>

                    <!-- FILTERS & CHARTS -->
                    <div class="filters-section">
                        <!-- Classification -->
                        <div class="filter-chart-block">
                            <div class="filter-group">
                                <label class="filter-label">🎯 التصنيف</label>
                                <select class="filter-select" id="classificationFilter" onchange="updateCharts()">
                                    <option value="all">الكل</option>
                                    <option value="VIP">VIP 🔥</option>
                                    <option value="WARM">WARM 🪵</option>
                                    <option value="COLD">COLD ❄️</option>
                                </select>
                            </div>
                            <div class="chart-title">توزيع التصنيف</div>
                            <div class="chart-canvas-container">
                                <canvas id="classificationChart"></canvas>
                            </div>
                            <div class="chart-legend" id="classificationLegend"></div>
                        </div>

                        <!-- Status -->
                        <div class="filter-chart-block">
                            <div class="filter-group">
                                <label class="filter-label">⏳ الحالة</label>
                                <select class="filter-select" id="statusFilter" onchange="updateCharts()">
                                    <option value="all">الكل</option>
                                    <option value="Nouveau">Nouveau 🆕</option>
                                    <option value="EnCours">En cours ⏳</option>
                                    <option value="Vendu">Vendu ✅</option>
                                    <option value="Perdu">Perdu ❌</option>
                                </select>
                            </div>
                            <div class="chart-title">توزيع الحالة</div>
                            <div class="chart-canvas-container">
                                <canvas id="statusChart"></canvas>
                            </div>
                            <div class="chart-legend" id="statusLegend"></div>
                        </div>

                        <!-- Property Type -->
                        <div class="filter-chart-block">
                            <div class="filter-group">
                                <label class="filter-label">🏠 نوع العقار</label>
                                <select class="filter-select" id="propertyFilter" onchange="updateCharts()">
                                    <option value="all">الكل</option>
                                    <option value="Apartment">شقة 🏢</option>
                                    <option value="Villa">فيلا 🏰</option>
                                    <option value="Commercial">محل تجاري 🏪</option>
                                    <option value="Land">أرض 📍</option>
                                </select>
                            </div>
                            <div class="chart-title">توزيع نوع العقار</div>
                            <div class="chart-canvas-container">
                                <canvas id="propertyChart"></canvas>
                            </div>
                            <div class="chart-legend" id="propertyLegend"></div>
                        </div>
                    </div>

                    <!-- LEADS TABLE -->
                    <div class="table-container">
                        <div class="table-title">📋 جدول العملاء</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم</th>
                                    <th>الهاتف</th>
                                    <th>الميزانية</th>
                                    <th>نوع العقار</th>
                                    <th>الحالة</th>
                                    <th>التصنيف</th>
                                </tr>
                            </thead>
                            <tbody id="leadsTableBody"></tbody>
                        </table>
                    </div>

                    <!-- MONTHLY COMPARISON TABLE -->
                    <div class="monthly-comparison">
                        <div class="comparison-title">
                            📊 جدول المقارنة الشهري المفصل
                        </div>
                        <div class="comparison-table-wrapper">
                            <table class="comparison-table">
                                <thead>
                                    <tr>
                                        <th>المؤشر / الفئة</th>
                                        <th>الشهر الماضي</th>
                                        <th>هذا الشهر</th>
                                        <th>نسبة التطور %</th>
                                    </tr>
                                </thead>
                                <tbody id="comparisonTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- ANALYTICS SECTION -->
                <div id="analytics" class="section" style="display: none;">
                    <div style="text-align: center; padding: 60px 20px; color: #94a3b8;">
                        <div style="font-size: 48px; margin-bottom: 20px;">📈</div>
                        <p style="font-size: 18px; font-weight: 600;">قسم التحليلات المتقدمة</p>
                        <p style="margin-top: 10px; color: #64748b;">سيتم إضافة المزيد من التقارير والرسوم البيانية قريباً</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentLanguage = 'ar';
        let currentTimeFilter = 'today';
        let chartInstances = {};

        // Extract budget number
        function parseBudget(budgetStr) {
            if (!budgetStr) return 0;
            const match = budgetStr.match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        }

        // Fetch data from Google Sheets
        async function fetchData() {
            try {
                const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQz9JgepSHyiEXcin3VkIgx5jGnQfdTTJKxCTuAsJMslONSZcSJj1GLEkaynd4lIksZpc2ht933QUcM/pub?output=csv');
                const csv = await response.text();
                
                const rows = csv.split('\n');
                const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
                
                allData = rows.slice(1).map(row => {
                    const values = row.split(',').map(v => v.trim());
                    const obj = {};
                    headers.forEach((h, i) => obj[h] = values[i] || '');
                    return obj;
                }).filter(r => Object.values(r).some(v => v));

                updateDashboard();
            } catch (err) {
                console.error('Error:', err);
            }
        }

        // Filter data by time
        function getFilteredData() {
            const classFilter = document.getElementById('classificationFilter')?.value || 'all';
            const statusFilter = document.getElementById('statusFilter')?.value || 'all';
            const propertyFilter = document.getElementById('propertyFilter')?.value || 'all';
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';

            return allData.filter(item => {
                const classMatch = classFilter === 'all' || (item['classification'] || '').includes(classFilter);
                const statusMatch = statusFilter === 'all' || (item['status'] || '').includes(statusFilter);
                const propertyMatch = propertyFilter === 'all' || (item['type'] || '').includes(propertyFilter);
                const searchMatch = !searchTerm || (item['name'] || item['nom'] || '').toLowerCase().includes(searchTerm) || (item['phone'] || item['telephone'] || '').includes(searchTerm);

                return classMatch && statusMatch && propertyMatch && searchMatch;
            });
        }

        // Get current month data
        function getCurrentMonthData() {
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();

            return allData.filter(item => {
                const itemDate = new Date(item['date'] || today);
                return itemDate.getMonth() === currentMonth && itemDate.getFullYear() === currentYear;
            });
        }

        // Get previous month data
        function getPreviousMonthData() {
            const today = new Date();
            let prevMonth = today.getMonth() - 1;
            let prevYear = today.getFullYear();
            if (prevMonth < 0) {
                prevMonth = 11;
                prevYear--;
            }

            return allData.filter(item => {
                const itemDate = new Date(item['date'] || today);
                return itemDate.getMonth() === prevMonth && itemDate.getFullYear() === prevYear;
            });
        }

        // Calculate growth percentage
        function calculateGrowth(current, previous) {
            if (previous === 0) return current > 0 ? 100 : 0;
            return (((current - previous) / previous) * 100).toFixed(1);
        }

        // Create growth indicator
        function createGrowthIndicator(growth) {
            const growthNum = parseFloat(growth);
            if (growthNum > 0) {
                return `<span class="growth-positive">📈</span> <span class="growth-percent">${growth}%</span>`;
            } else if (growthNum < 0) {
                return `<span class="growth-negative">📉</span> <span class="growth-percent">${growth}%</span>`;
            } else {
                return `<span class="growth-neutral">➖</span> <span class="growth-percent">0%</span>`;
            }
        }

        // Render comparison table
        function renderComparisonTable() {
            const currentData = getCurrentMonthData();
            const previousData = getPreviousMonthData();

            const metrics = [
                {
                    name: '👥 مجموع العملاء',
                    current: currentData.length,
                    previous: previousData.length
                },
                {
                    name: '🏢 الشقق',
                    current: currentData.filter(d => (d['type'] || '').includes('Apartment')).length,
                    previous: previousData.filter(d => (d['type'] || '').includes('Apartment')).length
                },
                {
                    name: '🏰 الفيلات',
                    current: currentData.filter(d => (d['type'] || '').includes('Villa')).length,
                    previous: previousData.filter(d => (d['type'] || '').includes('Villa')).length
                },
                {
                    name: '🏪 المحلات التجارية',
                    current: currentData.filter(d => (d['type'] || '').includes('Commercial')).length,
                    previous: previousData.filter(d => (d['type'] || '').includes('Commercial')).length
                },
                {
                    name: '📍 الأراضي',
                    current: currentData.filter(d => (d['type'] || '').includes('Land')).length,
                    previous: previousData.filter(d => (d['type'] || '').includes('Land')).length
                },
                {
                    name: '🆕 العملاء الجدد',
                    current: currentData.filter(d => (d['status'] || '').includes('Nouveau')).length,
                    previous: previousData.filter(d => (d['status'] || '').includes('Nouveau')).length
                },
                {
                    name: '⏳ الصفقات قيد التنفيذ',
                    current: currentData.filter(d => (d['status'] || '').includes('cours')).length,
                    previous: previousData.filter(d => (d['status'] || '').includes('cours')).length
                },
                {
                    name: '✅ الصفقات المبرمة',
                    current: currentData.filter(d => (d['status'] || '').includes('Vendu')).length,
                    previous: previousData.filter(d => (d['status'] || '').includes('Vendu')).length
                },
                {
                    name: '❌ الصفقات المفقودة',
                    current: currentData.filter(d => (d['status'] || '').includes('Perdu')).length,
                    previous: previousData.filter(d => (d['status'] || '').includes('Perdu')).length
                },
                {
                    name: '🔥 العملاء VIP',
                    current: currentData.filter(d => (d['classification'] || '').includes('VIP')).length,
                    previous: previousData.filter(d => (d['classification'] || '').includes('VIP')).length
                },
                {
                    name: '🪵 العملاء WARM',
                    current: currentData.filter(d => (d['classification'] || '').includes('WARM')).length,
                    previous: previousData.filter(d => (d['classification'] || '').includes('WARM')).length
                },
                {
                    name: '❄️ العملاء COLD',
                    current: currentData.filter(d => (d['classification'] || '').includes('COLD')).length,
                    previous: previousData.filter(d => (d['classification'] || '').includes('COLD')).length
                }
            ];

            const tbody = document.getElementById('comparisonTableBody');
            tbody.innerHTML = metrics.map(metric => {
                const growth = calculateGrowth(metric.current, metric.previous);
                return `
                    <tr>
                        <td class="metric-name">${metric.name}</td>
                        <td class="value-previous">${metric.previous}</td>
                        <td class="value-current">${metric.current}</td>
                        <td class="value-growth">${createGrowthIndicator(growth)}</td>
                    </tr>
                `;
            }).join('');
        }

        // Update metrics
        function updateMetrics() {
            const filtered = getFilteredData();
            const totalClients = filtered.length;
            const avgBudget = filtered.length > 0 ? 
                Math.round(filtered.reduce((sum, d) => sum + parseBudget(d['budget'] || d['budgets'] || '0'), 0) / filtered.length) : 0;
            const vipCount = filtered.filter(d => (d['classification'] || '').includes('VIP')).length;

            document.getElementById('metricsGrid').innerHTML = `
                <div class="metric-card">
                    <div class="metric-content">
                        <div class="metric-info">
                            <h3>مجموع العملاء</h3>
                            <div class="metric-value">${totalClients}</div>
                        </div>
                        <div class="metric-icon">👥</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-content">
                        <div class="metric-info">
                            <h3>متوسط الميزانية</h3>
                            <div class="metric-value">${avgBudget}M</div>
                        </div>
                        <div class="metric-icon">💰</div>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-content">
                        <div class="metric-info">
                            <h3>عملاء VIP</h3>
                            <div class="metric-value">${vipCount}</div>
                        </div>
                        <div class="metric-icon">⭐</div>
                    </div>
                </div>
            `;
        }

        // Update charts
        function updateCharts() {
            const filtered = getFilteredData();

            const classData = {
                'VIP 🔥': filtered.filter(d => (d['classification'] || '').includes('VIP')).length,
                'WARM 🪵': filtered.filter(d => (d['classification'] || '').includes('WARM')).length,
                'COLD ❄️': filtered.filter(d => (d['classification'] || '').includes('COLD')).length,
            };

            const statusData = {
                'Nouveau 🆕': filtered.filter(d => (d['status'] || '').includes('Nouveau')).length,
                'En cours ⏳': filtered.filter(d => (d['status'] || '').includes('cours')).length,
                'Vendu ✅': filtered.filter(d => (d['status'] || '').includes('Vendu')).length,
                'Perdu ❌': filtered.filter(d => (d['status'] || '').includes('Perdu')).length,
            };

            const propertyData = {
                'شقة 🏢': filtered.filter(d => (d['type'] || '').includes('Apartment')).length,
                'فيلا 🏰': filtered.filter(d => (d['type'] || '').includes('Villa')).length,
                'محل تجاري 🏪': filtered.filter(d => (d['type'] || '').includes('Commercial')).length,
                'أرض 📍': filtered.filter(d => (d['type'] || '').includes('Land')).length,
            };

            renderCharts(classData, statusData, propertyData);
            renderLegends(classData, statusData, propertyData);
            renderLeadsTable(filtered);
        }

        // Render charts
        function renderCharts(classData, statusData, propertyData) {
            const colors = ['#3b82f6', '#f97316', '#8b5cf6', '#ec4899', '#10b981', '#06b6d4'];

            if (chartInstances.classification) chartInstances.classification.destroy();
            const ctx1 = document.getElementById('classificationChart');
            chartInstances.classification = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(classData),
                    datasets: [{
                        data: Object.values(classData),
                        backgroundColor: colors.slice(0, 3),
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            if (chartInstances.status) chartInstances.status.destroy();
            const ctx2 = document.getElementById('statusChart');
            chartInstances.status = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: Object.keys(statusData),
                    datasets: [{
                        data: Object.values(statusData),
                        backgroundColor: colors.slice(0, 4),
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            });

            if (chartInstances.property) chartInstances.property.destroy();
            const ctx3 = document.getElementById('propertyChart');
            chartInstances.property = new Chart(ctx3, {
                type: 'pie',
                data: {
                    labels: Object.keys(propertyData),
                    datasets: [{
                        data: Object.values(propertyData),
                        backgroundColor: colors.slice(0, 4),
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Render legends
        function renderLegends(classData, statusData, propertyData) {
            const colors = ['#3b82f6', '#f97316', '#8b5cf6', '#ec4899', '#10b981', '#06b6d4'];

            document.getElementById('classificationLegend').innerHTML = Object.entries(classData).map((item, i) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[i]}"></div>
                    <span class="legend-text">${item[0]}</span>
                    <span class="legend-value">${item[1]}</span>
                </div>
            `).join('');

            document.getElementById('statusLegend').innerHTML = Object.entries(statusData).map((item, i) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[i]}"></div>
                    <span class="legend-text">${item[0]}</span>
                    <span class="legend-value">${item[1]}</span>
                </div>
            `).join('');

            document.getElementById('propertyLegend').innerHTML = Object.entries(propertyData).map((item, i) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[i]}"></div>
                    <span class="legend-text">${item[0]}</span>
                    <span class="legend-value">${item[1]}</span>
                </div>
            `).join('');
        }

        // Render table
        function renderLeadsTable(filtered) {
            const tbody = document.getElementById('leadsTableBody');
            tbody.innerHTML = filtered.slice(0, 20).map(item => `
                <tr>
                    <td>${item['name'] || item['nom'] || '-'}</td>
                    <td>${item['phone'] || item['telephone'] || '-'}</td>
                    <td>${parseBudget(item['budget'] || item['budgets'] || '0')}M</td>
                    <td>${item['type'] || '-'}</td>
                    <td><span class="badge">${item['status'] || '-'}</span></td>
                    <td><span class="badge ${(item['classification'] || '').toLowerCase()}">${item['classification'] || '-'}</span></td>
                </tr>
            `).join('');
        }

        // Switch section
        function switchSection(section) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(section).style.display = 'block';
            
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.menu-btn').classList.add('active');
        }

        // Set time filter
        function setTimeFilter(filter) {
            currentTimeFilter = filter;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateDashboard();
        }

        // Main update
        function updateDashboard() {
            updateMetrics();
            updateCharts();
            renderComparisonTable();
        }

        // Event listeners
        document.getElementById('languageSelect').addEventListener('change', (e) => {
            currentLanguage = e.target.value;
        });

        document.getElementById('searchInput').addEventListener('input', () => {
            updateCharts();
        });

        // Initialize
        fetchData();
    </script>
</body>
</html>
